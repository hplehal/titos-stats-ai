services:
  postgres:
    image: postgres:16-alpine
    container_name: titos-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: titos
      POSTGRES_PASSWORD: devpw
      POSTGRES_DB: titos
    ports:
      - "5432:5432"
    volumes:
      - titos_pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U titos -d titos"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  titos_pgdata_dev:
